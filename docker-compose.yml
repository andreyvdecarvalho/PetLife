# ==============================================================================
# PetLife — Docker Compose (Development / Staging)
# ==============================================================================
# Uso:
#   docker compose up -d --build        → Sobe tudo com rebuild
#   docker compose up -d                → Sobe sem rebuild
#   docker compose logs -f backend      → Acompanha logs do backend
#   docker compose down -v              → Para tudo e remove volumes
# ==============================================================================

services:
  # ============================================================================
  # PostgreSQL 16 — Banco de dados principal
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: petlife-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: petlife
      POSTGRES_USER: petlife
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petlife_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petlife -d petlife"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ============================================================================
  # RabbitMQ — Message Broker (usado pelo spring-boot-starter-amqp)
  # ============================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: petlife-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-petlife}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-petlife_dev}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

  # ============================================================================
  # Backend — Spring Boot 4.1 + Java 21
  # ============================================================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: petlife-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Datasource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petlife
      SPRING_DATASOURCE_USERNAME: petlife
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-petlife_dev}
      # RabbitMQ
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-petlife}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-petlife_dev}
      # Hibernate
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # Flyway
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/petlife
      SPRING_FLYWAY_USER: petlife
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-petlife_dev}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "2.0"

  # ============================================================================
  # Web — React 19 + Vite (Nginx)
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081/api/v1}
    container_name: petlife-web
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

# ==============================================================================
# Volumes nomeados — persistem dados entre restarts
# ==============================================================================
volumes:
  pgdata:
    driver: local
  rabbitmq_data:
    driver: local
