server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # =========================================================================
    # Compressão Gzip
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # =========================================================================
    # Assets com hash no nome (ex: index-abc123.js)
    # Cache agressivo de 1 ano — safe porque o hash muda a cada build
    # =========================================================================
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =========================================================================
    # Favicon, manifest, robots.txt — cache moderado
    # =========================================================================
    location ~* \.(ico|webmanifest|robots\.txt)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # =========================================================================
    # SPA Fallback — redireciona todas as rotas para index.html
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Sem cache no index.html (para sempre pegar a versão mais recente)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # =========================================================================
    # Security Headers
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
}
