name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── BACKEND (Java) ───────────────────────────────────
  backend-quality:
    name: Backend — Java Quality
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: apps/backend/pom.xml

      - name: Compile
        working-directory: apps/backend
        run: mvn compile -B -q

      - name: Checkstyle
        working-directory: apps/backend
        run: mvn checkstyle:check -B

      - name: SpotBugs
        working-directory: apps/backend
        run: mvn spotbugs:check -B

      - name: Run Tests (Unit + Integration com Testcontainers)
        id: run-tests
        working-directory: apps/backend
        run: mvn verify -B
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: JaCoCo Coverage Gate (≥ 85%)
        working-directory: apps/backend
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          import os
          jacoco_path = 'target/site/jacoco/jacoco.xml'
          if not os.path.exists(jacoco_path):
              print('0')
              exit(0)
          tree = ET.parse(jacoco_path)
          root = tree.getroot()
          counters = {c.get('type'): c for c in root.findall('counter')}
          if 'LINE' not in counters:
              print('0')
              exit(0)
          missed = int(counters['LINE'].get('missed'))
          covered = int(counters['LINE'].get('covered'))
          total = missed + covered
          print(f'{covered/total*100:.1f}' if total > 0 else '0')
          ")
          echo "Coverage: $COVERAGE%"

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: apps/backend/target/site/jacoco/

      - name: Publish Test Results
        uses: dorny/test-reporter@v1.9.1
        if: always() && steps.run-tests.outcome != 'skipped'
        with:
          name: JUnit Test Results
          path: 'apps/backend/target/surefire-reports/*.xml,apps/backend/target/failsafe-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

  # ─── FRONTEND WEB ─────────────────────────────────────
  web-quality:
    name: Web — Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.0.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
        working-directory: . # instala todo o workspace

      - name: TypeScript Check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm eslint src --max-warnings 0

      - name: Run component tests with coverage
        run: pnpm vitest run --coverage

      - name: Coverage Gate Frontend (≥ 85%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% below 85%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE%"

      - name: Build PWA
        run: pnpm run build

  # ─── E2E ──────────────────────────────────────────────
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend-quality, web-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_DB: petlife_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: apps/backend/pom.xml

      - uses: actions/setup-node@v4
        with:
          node-version: '22.0.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm playwright install --with-deps chromium

      - name: Build backend JAR
        working-directory: apps/backend
        run: mvn package -DskipTests -B

      - name: Start backend
        working-directory: apps/backend
        run: |
          nohup java -jar target/petlife-backend-*.jar > backend.log 2>&1 &
          sleep 3
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/petlife_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Start web dev server
        working-directory: apps/web
        run: |
          nohup pnpm run dev > frontend.log 2>&1 &
          sleep 3

      - name: Wait for servers
        run: pnpm dlx wait-on --timeout 120000 http://127.0.0.1:8080/actuator/health http://127.0.0.1:5173

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== BACKEND LOGS ==="
          cat apps/backend/backend.log || true
          echo "=== FRONTEND LOGS ==="
          cat apps/web/frontend.log || true

      - name: Run Playwright E2E tests
        working-directory: apps/web
        run: pnpm playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
